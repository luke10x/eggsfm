<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    
    <!-- Gradients -->
    <linearGradient id="sdlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mixGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="songGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0ad4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec971f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sfxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9302c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333">eggsfm Audio Generation Pipeline</text>
  
  <!-- SDL Audio Callback -->
  <rect x="50" y="80" width="200" height="60" rx="8" fill="url(#sdlGrad)" stroke="#2c5aa0" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">SDL Audio Callback</text>
  <text x="150" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">~172 Hz (256 frames)</text>
  
  <!-- Arrow to xfm_mix -->
  <line x1="250" y1="110" x2="320" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- xfm_mix -->
  <rect x="320" y="80" width="180" height="60" rx="8" fill="url(#mixGrad)" stroke="#3d8b3d" stroke-width="2"/>
  <text x="410" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">xfm_mix()</text>
  <text x="410" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Main audio generator</text>
  
  <!-- Split to update_song and update_sfx -->
  <line x1="500" y1="110" x2="550" y2="110" stroke="#666" stroke-width="2"/>
  <line x1="550" y1="110" x2="550" y2="200" stroke="#666" stroke-width="2"/>
  <line x1="550" y1="200" x2="580" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="110" x2="550" y2="350" stroke="#666" stroke-width="2"/>
  <line x1="550" y1="350" x2="580" y2="350" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- update_song -->
  <rect x="580" y="170" width="200" height="60" rx="8" fill="url(#songGrad)" stroke="#c77c11" stroke-width="2"/>
  <text x="680" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">update_song()</text>
  <text x="680" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Advances song position</text>
  
  <!-- update_sfx -->
  <rect x="580" y="320" width="200" height="60" rx="8" fill="url(#sfxGrad)" stroke="#a02622" stroke-width="2"/>
  <text x="680" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">update_sfx()</text>
  <text x="680" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Advances SFX positions</text>
  
  <!-- Arrows to key_on/off boxes -->
  <line x1="780" y1="200" x2="830" y2="200" stroke="#666" stroke-width="2"/>
  <line x1="830" y1="200" x2="830" y2="240" stroke="#666" stroke-width="2"/>
  <line x1="830" y1="240" x2="850" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="780" y1="350" x2="830" y2="350" stroke="#666" stroke-width="2"/>
  <line x1="830" y1="350" x2="830" y2="280" stroke="#666" stroke-width="2"/>
  <line x1="830" y1="280" x2="850" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- key_on box -->
  <rect x="850" y="220" width="100" height="40" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="900" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">key_on()</text>
  
  <!-- key_off box -->
  <rect x="850" y="260" width="100" height="40" rx="5" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="900" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">key_off()</text>
  
  <!-- Merge arrows -->
  <line x1="780" y1="200" x2="900" y2="200" stroke="#666" stroke-width="2"/>
  <line x1="900" y1="200" x2="900" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="350" x2="900" y2="350" stroke="#666" stroke-width="2"/>
  <line x1="900" y1="350" x2="900" y2="450" stroke="#666" stroke-width="2"/>
  
  <!-- generate_buffer -->
  <rect x="800" y="450" width="200" height="60" rx="8" fill="url(#chipGrad)" stroke="#6c3483" stroke-width="2"/>
  <text x="900" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">chip-&gt;generate_buffer()</text>
  <text x="900" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">YMFM FM Synthesis</text>
  
  <!-- Arrow to output -->
  <line x1="1000" y1="480" x2="1050" y2="480" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Audio Output -->
  <rect x="1050" y="450" width="120" height="60" rx="8" fill="url(#outGrad)" stroke="#117a65" stroke-width="2"/>
  <text x="1110" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Audio Output</text>
  <text x="1110" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">int16_t stereo</text>
  
  <!-- Timing info box -->
  <rect x="50" y="180" width="240" height="140" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <text x="170" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">⏱️ Timing</text>
  <text x="70" y="230" font-family="Courier New, monospace" font-size="11" fill="#555">Sample Rate: 44100 Hz</text>
  <text x="70" y="250" font-family="Courier New, monospace" font-size="11" fill="#555">Buffer Size: 256 frames</text>
  <text x="70" y="270" font-family="Courier New, monospace" font-size="11" fill="#555">Callback Rate: 172 Hz</text>
  <text x="70" y="290" font-family="Courier New, monospace" font-size="11" fill="#555">Latency: 5.8 ms</text>
  <text x="70" y="310" font-family="Courier New, monospace" font-size="11" fill="#555">CPU Budget: ~600 μs</text>
  
  <!-- Note triggering info -->
  <rect x="50" y="350" width="240" height="130" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <text x="170" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">🎵 Note Triggering</text>
  <text x="70" y="400" font-family="Arial, sans-serif" font-size="11" fill="#555">Song:</text>
  <text x="70" y="418" font-family="Courier New, monospace" font-size="10" fill="#666">  • At row boundaries</text>
  <text x="70" y="435" font-family="Courier New, monospace" font-size="10" fill="#666">  • After gap samples</text>
  <text x="70" y="455" font-family="Arial, sans-serif" font-size="11" fill="#555">SFX:</text>
  <text x="70" y="473" font-family="Courier New, monospace" font-size="10" fill="#666">  • Dynamic gap timing</text>
  
  <!-- Voice pool info -->
  <rect x="50" y="510" width="240" height="100" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  <text x="170" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">🎤 Voice Pool</text>
  <text x="70" y="560" font-family="Courier New, monospace" font-size="11" fill="#555">6 voices per module</text>
  <text x="70" y="580" font-family="Courier New, monospace" font-size="11" fill="#555">Priority-based stealing</text>
  <text x="70" y="600" font-family="Courier New, monospace" font-size="11" fill="#555">Oldest voice stolen first</text>
  
  <!-- Data flow callout -->
  <rect x="320" y="180" width="230" height="180" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="435" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#856404">📦 Data Flow</text>
  <text x="340" y="230" font-family="Arial, sans-serif" font-size="11" fill="#856404">Input: module state</text>
  <text x="340" y="250" font-family="Arial, sans-serif" font-size="11" fill="#856404">  • Active song/SFX</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="11" fill="#856404">  • Patch data</text>
  <text x="340" y="290" font-family="Arial, sans-serif" font-size="11" fill="#856404">  • Voice states</text>
  <text x="340" y="320" font-family="Arial, sans-serif" font-size="11" fill="#856404">Output: audio buffer</text>
  <text x="340" y="340" font-family="Arial, sans-serif" font-size="11" fill="#856404">  • int16_t stereo</text>
  <text x="340" y="360" font-family="Arial, sans-serif" font-size="11" fill="#856404">  • frames × 2 samples</text>
  
  <!-- FM Synthesis detail -->
  <rect x="800" y="550" width="370" height="120" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2"/>
  <text x="985" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">🎛️ FM Synthesis (YMFM)</text>
  <text x="820" y="600" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a">Per voice:</text>
  <text x="820" y="620" font-family="Courier New, monospace" font-size="10" fill="#7a3a9a">  • Phase calculation (Bresenham)</text>
  <text x="820" y="640" font-family="Courier New, monospace" font-size="10" fill="#7a3a9a">  • Operator modulation (ALG)</text>
  <text x="820" y="660" font-family="Courier New, monospace" font-size="10" fill="#7a3a9a">  • Envelope application (EG)</text>
  <text x="1000" y="600" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a">Per chip:</text>
  <text x="1000" y="620" font-family="Courier New, monospace" font-size="10" fill="#7a3a9a">  • LFO modulation (AMS/FMS)</text>
  <text x="1000" y="640" font-family="Courier New, monospace" font-size="10" fill="#7a3a9a">  • Stereo output mixing</text>
  <text x="1000" y="660" font-family="Courier New, monospace" font-size="10" fill="#7a3a9a">  • Sample rate conversion</text>
  
  <!-- Thread info -->
  <rect x="800" y="700" width="370" height="70" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="985" y="725" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1565c0">🧵 Thread Safety</text>
  <text x="820" y="750" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">Audio thread: xfm_mix() calls (read-only)</text>
  <text x="820" y="770" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">Main thread: Use SDL_LockAudioDevice() for writes</text>
</svg>
